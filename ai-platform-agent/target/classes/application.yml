spring:
  application:
    name: ai-platform-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.0.11:3306/ai_platform?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true
    username: root
    password: cqcdi@135!
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8081

# 与控制面相同桶配置，用于按 objectKey 拉取知识库原文
minio:
  endpoint: ${MINIO_ENDPOINT:http://192.168.0.35:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: "cqcdi@135!"
  bucket-name: ${MINIO_BUCKET:ai-platform}

ai:
  gateway:
    providers:
      CODEX:
        base-url: https://api.openai.com
        chat-completions-path: /v1/chat/completions

  rag:
    # Qdrant 向量数据库地址（Windows Docker 本地）
    qdrant:
      base-url: http://127.0.0.1:6333
      collection-prefix: kb_

    # Ollama embedding 服务地址
    ollama:
      base-url: http://127.0.0.1:11434
      embedding-model: bge-m3

    # 检索参数
    search:
      top-k: 5
      # 余弦相似度下限（在应用层过滤）。短词/单词 Query 往往整体分数偏低，过高易无结果；可用检索接口 body 覆盖 scoreThreshold
      score-threshold: 0.35
      max-chunk-chars: 800
