spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:agentdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

ai:
  gateway:
    providers:
      CODEX:
        base-url: http://localhost:9999
        chat-completions-path: /v1/chat/completions
