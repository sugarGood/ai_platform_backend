app:
  security:
    enabled: false

sa-token:
  token-name: Authorization
  is-read-header: true
  is-read-cookie: false
  token-prefix: Bearer
  timeout: 86400
  active-timeout: -1

spring:
  # 测试环境不连真实 Redis：排除自动配置后 Sa-Token 回退内存存储
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ai_platform_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
