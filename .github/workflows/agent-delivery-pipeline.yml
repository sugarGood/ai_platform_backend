name: agent-delivery-pipeline

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  agent-b-rbac:
    name: Agent B - RBAC foundation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run RBAC-related tests
        run: >-
          mvn -B -pl ai-platform-server
          -Dtest=*Role*,*Permission*,*ProjectMember*,*Rbac*
          -Dsurefire.failIfNoSpecifiedTests=false
          test

  agent-a-me-credential:
    name: Agent A - Me & credential APIs
    runs-on: ubuntu-latest
    needs: agent-b-rbac
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Me/Credential-related tests
        run: >-
          mvn -B -pl ai-platform-server
          -Dtest=*Me*,*Credential*,*UserClientBinding*
          -Dsurefire.failIfNoSpecifiedTests=false
          test

  agent-c-ai-capability:
    name: Agent C - AI capability configuration
    runs-on: ubuntu-latest
    needs: agent-b-rbac
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run capability-related tests
        run: >-
          mvn -B -pl ai-platform-server
          -Dtest=*Knowledge*,*Skill*,*Tool*,*Mcp*
          -Dsurefire.failIfNoSpecifiedTests=false
          test

  agent-d-gateway-quota:
    name: Agent D - Gateway/quota integration
    runs-on: ubuntu-latest
    needs: [agent-a-me-credential, agent-c-ai-capability]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run usage/quota/gateway tests
        run: >-
          mvn -B -pl ai-platform-server,ai-platform-agent
          -Dtest=*Usage*,*Quota*,*Gateway*,*ProjectContext*,*CredentialAuth*
          -Dsurefire.failIfNoSpecifiedTests=false
          test

      - name: Run full verify as final gate
        run: mvn -B verify
